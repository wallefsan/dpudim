<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divino Pudim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&display=swap');
body{font-family:'Lora',serif;background-color:#fff8e7;color:#4a2511;margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{max-width:600px;width:100%;background:#fdfdfd;padding:40px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);border:2px solid #e2c08d;position:relative;}
h1{font-family:'Playfair Display',serif;text-align:center;color:#4a2511;font-size:2.5em;font-weight:700;margin-top:0;}
.cardapio-oficial{font-size:1.2em;color:#8c6a46;margin-bottom:20px;text-align:center;text-transform:uppercase;letter-spacing:2px;}
.produtos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
.produto{display:flex;flex-direction:column;align-items:center;background:#fff;padding:15px;border-radius:10px;border:1px solid #eee;text-align:center;transition:transform 0.3s ease;}
.produto:hover{transform:translateY(-5px);box-shadow:0 5px 15px rgba(0,0,0,0.05);}
.img-pudim{width:120px;height:120px;object-fit:contain;border-radius:10px;margin-bottom:10px;border:2px solid #e2c08d;background-color:#fff8e7;}
.produto-nome{font-weight:bold;font-size:1.1em;margin-bottom:5px;}
.produto-preco{color:#d2691e;font-weight:bold;font-size:1.2em;margin-bottom:10px;}
.produto-qtd{display:flex;align-items:center;gap:10px;}
.qtd-btn{background-color:#f0f0f0;color:#4a2511;border:1px solid #ccc;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:1em;}
.qtd-input{width:40px;text-align:center;padding:5px;border:1px solid #ccc;border-radius:5px;font-size:1em;}
.taxa-entrega{text-align:center;font-weight:bold;color:#d2691e;margin-bottom:20px;font-size:1.1em;}
.resumo{background-color:#f9f9f9;padding:20px;border-radius:10px;margin-bottom:30px;text-align:center;}
.total-pagar{font-size:1.4em;color:#4a2511;font-weight:bold;margin-top:10px;}
label{display:block;margin-top:15px;font-weight:bold;font-size:14px;color:#4a2511;}
input[type="text"],select,input[type="number"]{width:100%;padding:12px;margin-top:5px;box-sizing:border-box;border:1px solid #e2c08d;border-radius:8px;font-family:inherit;}
#divTroco{display:none;}
button.enviar-whatsapp{width:100%;padding:15px;margin-top:30px;background-color:#25D366;color:white;border:none;border-radius:8px;font-size:1.2em;font-weight:bold;cursor:pointer;}
.footer{margin-top:40px;text-align:center;color:#8c6a46;font-style:italic;}
.instagram{margin-top:10px;font-weight:bold;color:#d2691e;}
.pix-chave{margin-top:15px;font-weight:bold;color:#4a2511;font-size:1.1em;}
#loading-msg{text-align:center;color:#8c6a46;padding:20px;font-style:italic;}
</style>
</head>
<body>
<div class="container">
<h1>Divino Pudim</h1>
<div class="cardapio-oficial">Cardapio Oficial</div>
<p style="text-align:center;margin-bottom:30px;">Escolha suas delicias e faca seu pedido!</p>
<div id="loading-msg">Carregando cardapio...</div>
<div class="produtos" id="listaProdutos"></div>
<div class="taxa-entrega" id="taxaEntregaLabel"></div>
<div class="resumo">
<div>Subtotal: <span id="spanSubtotal">R$ 0,00</span></div>
<div>Taxa de entrega: <span id="spanEntrega">R$ 0,00</span></div>
<div class="total-pagar">Total a pagar: <span id="spanTotal">R$ 0,00</span></div>
</div>
<form id="formPedido">
<label for="nome">Seu Nome Completo:</label>
<input type="text" id="nome" placeholder="Ex: Joao Silva" required>
<label for="endereco">Endereco Completo para Entrega:</label>
<input type="text" id="endereco" placeholder="Rua, Numero, Bairro" required>
<label for="pagamento">Forma de Pagamento:</label>
<select id="pagamento" onchange="verificarTroco()">
<option value="">Selecione...</option>
<option value="Pix">Pix</option>
<option value="Especie">Em especie (no ato da entrega)</option>
<option value="Cartao">Cartao (Levar maquininha)</option>
</select>
<div id="divTroco">
<label for="troco">Troco para quanto?</label>
<input type="number" id="troco" placeholder="Ex: 50" min="0" step="0.01">
</div>
<button type="button" class="enviar-whatsapp" onclick="enviarWhatsApp()">Confirmar Pedido no WhatsApp</button>
</form>
<div class="footer">
<p>"O sabor que conquista a cada colherada!"</p>
<div class="instagram">@divinopudimsobradinho</div>
<div class="pix-chave">Chave PIX: divinopudim01@gmail.com</div>
</div>
</div>
</body>
</html>
