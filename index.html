<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divino Pudim - Cardápio Oficial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;700&display=swap');
  body { font-family: 'Lora', serif; background-color: #fff8e7; color: #4a2511; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { max-width: 600px; width: 100%; background: #fdfdfd; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #e2c08d; position: relative; }
  .container::before { content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 1px solid #e2c08d; border-radius: 10px; pointer-events: none; }
  h1, h2 { font-family: 'Playfair Display', serif; text-align: center; margin-top: 0; }
  h1 { color: #4a2511; font-size: 2.5em; font-weight: 700; }
  .cardapio-oficial { font-size: 1.2em; color: #8c6a46; margin-bottom: 20px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
  .produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .produto { display: flex; flex-direction: column; align-items: center; background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #eee; text-align: center; transition: transform 0.3s ease; }
  .produto:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
  .img-pudim { width: 120px; height: 120px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; border: 2px solid #e2c08d; background-color: #fff8e7; }
  .produto-nome { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
  .produto-preco { color: #d2691e; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
  .produto-qtd { display: flex; align-items: center; gap: 10px; }
  .qtd-btn { background-color: #f0f0f0; color: #4a2511; border: 1px solid #ccc; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 1em; }
  .qtd-btn:hover { background-color: #e0e0e0; }
  .qtd-input { width: 40px; text-align: center; padding: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
  .taxa-entrega { text-align: center; font-weight: bold; color: #d2691e; margin-bottom: 20px; font-size: 1.1em; }
  .resumo { background-color: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
  .total-pagar { font-size: 1.4em; color: #4a2511; font-weight: bold; margin-top: 10px; }
  label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #4a2511; }
  input[type="text"], select, input[type="number"] { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; border: 1px solid #e2c08d; border-radius: 8px; font-family: inherit; }
  #divTroco { display: none; }
  button.enviar-whatsapp { width: 100%; padding: 15px; margin-top: 30px; background-color: #25D366; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; font-family: 'Playfair Display', serif; }
  button.enviar-whatsapp:hover { background-color: #128C7E; }
  .footer { margin-top: 40px; text-align: center; color: #8c6a46; font-style: italic; }
  .instagram { margin-top: 10px; font-weight: bold; color: #d2691e; }
  .pix-chave { margin-top: 15px; font-weight: bold; color: #4a2511; font-size: 1.1em; }
  #loading-msg { text-align: center; color: #8c6a46; padding: 20px; font-style: italic; }
</style>
</head>
<body>

<div class="container">
  <h1>Divino Pudim</h1>
  <div class="cardapio-oficial">Cardápio Oficial</div>
  <p style="text-align: center; margin-bottom: 30px;">Escolha suas delícias e faça seu pedido!</p>

  <div id="loading-msg">Carregando cardápio...</div>
  <div class="produtos" id="listaProdutos"></div>

  <div class="taxa-entrega" id="taxaEntregaLabel"></div>

  <div class="resumo">
    <div>Subtotal: <span id="spanSubtotal">R$ 0,00</span></div>
    <div>Taxa de entrega: <span id="spanEntrega">R$ 0,00</span></div>
    <div class="total-pagar">Total a pagar: <span id="spanTotal">R$ 0,00</span></div>
  </div>

  <form id="formPedido">
    <label for="nome">Seu Nome Completo:</label>
    <input type="text" id="nome" placeholder="Ex: João Silva" required>

    <label for="endereco">Endereço Completo para Entrega:</label>
    <input type="text" id="endereco" placeholder="Rua, Número, Bairro" required>

    <label for="pagamento">Forma de Pagamento:</label>
    <select id="pagamento" onchange="verificarTroco()">
      <option value="">Selecione...</option>
      <option value="Pix">Pix</option>
      <option value="Em espécie (no ato da entrega)">Em espécie (no ato da entrega)</option>
      <option value="Cartão">Cartão (Levar maquininha)</option>
    </select>

    <div id="divTroco">
      <label for="troco">Troco para quanto?</label>
      <input type="number" id="troco" placeholder="Ex: 50" min="0" step="0.01">
    </div>

    <button type="button" class="enviar-whatsapp" onclick="enviarWhatsApp()">Confirmar Pedido no WhatsApp</button>
  </form>

  <div class="footer">
    <p>"O sabor que conquista a cada colherada!"</p>
    <div class="instagram">@divinopudimsobradinho</div>
    <div class="pix-chave">Chave PIX: divinopudim01@gmail.com</div>
  </div>
</div>

<script>
  // ==============================================
  // CONFIGURACOES - edite apenas aqui se precisar
  // ==============================================
  const CSV_URL = "https://corsproxy.io/?https://docs.google.com/spreadsheets/d/e/2PACX-1vTFNdxLMj53mTlboA9MBG6J9v_7Lx7XyJvlCyIGJX3Oe7UpDo4B784in9gmieDYFKvEnK3HrkETid6t/pub?output=csv";
  const WHATSAPP_NUMERO = "5574998081472";
  // ==============================================

  let produtos = [];
  let taxaEntrega = 0;

  function parseCSV(text) {
    const linhas = text.trim().split("
");
    const cabecalho = linhas[0].split(",").map(c => c.trim().replace(/"/g, ""));
    const resultado = [];
    for (let i = 1; i < linhas.length; i++) {
      const cols = linhas[i].split(",").map(c => c.trim().replace(/"/g, ""));
      if (cols.length < 2) continue;
      const obj = {};
      cabecalho.forEach((key, idx) => { obj[key] = cols[idx] || ""; });
      resultado.push(obj);
    }
    return resultado;
  }

  async function carregarPlanilha() {
    try {
      const resp = await fetch(CSV_URL);
      const texto = await resp.text();
      const dados = parseCSV(texto);

      // Pega taxa de entrega (aceita tanto "taxa_entrega" quanto "taxa-entrega")
      dados.forEach(row => {
        const taxa = row["taxa_entrega"] || row["taxa-entrega"] || "";
        if (taxa && parseFloat(taxa.replace(",", ".")) > 0) {
          taxaEntrega = parseFloat(taxa.replace(",", "."));
        }
      });

      // Filtra produtos ativos (aceita SIM ou sim)
      produtos = dados
        .filter(row => row.ativo && row.ativo.toLowerCase() === "sim")
        .map(row => ({
          id: row.nome.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, ""),
          nome: row.nome,
          preco: parseFloat(row.preco.replace(",", ".")),
          imagem: row.imagem || ""
        }));

      renderizarProdutos();
      document.getElementById("loading-msg").style.display = "none";
      document.getElementById("taxaEntregaLabel").innerText = "Taxa de entrega: R$ " + taxaEntrega.toFixed(2).replace(".", ",");
      updateTotal();

    } catch (e) {
      document.getElementById("loading-msg").innerText = "Erro ao carregar cardápio. Recarregue a página.";
      console.error(e);
    }
  }

  function renderizarProdutos() {
    const container = document.getElementById("listaProdutos");
    container.innerHTML = "";
    produtos.forEach(p => {
      const div = document.createElement("div");
      div.className = "produto";
      div.innerHTML =
        '<img src="' + p.imagem + '" alt="' + p.nome + '" class="img-pudim" onerror="this.style.display='none'">' +
        '<div class="produto-nome">' + p.nome + '</div>' +
        '<div class="produto-preco">R$ ' + p.preco.toFixed(2).replace(".", ",") + '</div>' +
        '<div class="produto-qtd">' +
          '<button class="qtd-btn" onclick="mudarQtd('' + p.id + '', -1)">-</button>' +
          '<input type="number" id="' + p.id + '" class="qtd-input" value="0" min="0" onchange="updateTotal()">' +
          '<button class="qtd-btn" onclick="mudarQtd('' + p.id + '', 1)">+</button>' +
        '</div>';
      container.appendChild(div);
    });
  }

  function mudarQtd(id, delta) {
    const input = document.getElementById(id);
    let atual = parseInt(input.value);
    if (isNaN(atual)) atual = 0;
    input.value = Math.max(0, atual + delta);
    updateTotal();
  }

  function updateTotal() {
    let subtotal = 0;
    produtos.forEach(p => {
      const qtd = parseInt(document.getElementById(p.id) ? document.getElementById(p.id).value : 0) || 0;
      subtotal += qtd * p.preco;
    });
    const total = subtotal + taxaEntrega;
    document.getElementById("spanSubtotal").innerText = "R$ " + subtotal.toFixed(2).replace(".", ",");
    document.getElementById("spanEntrega").innerText = "R$ " + taxaEntrega.toFixed(2).replace(".", ",");
    document.getElementById("spanTotal").innerText = "R$ " + total.toFixed(2).replace(".", ",");
  }

  function verificarTroco() {
    const pagamento = document.getElementById("pagamento").value;
    document.getElementById("divTroco").style.display = pagamento === "Em espécie (no ato da entrega)" ? "block" : "none";
    if (pagamento !== "Em espécie (no ato da entrega)") document.getElementById("troco").value = "";
  }

  function enviarWhatsApp() {
    const nome = document.getElementById("nome").value.trim();
    const endereco = document.getElementById("endereco").value.trim();
    const pagamento = document.getElementById("pagamento").value;
    const troco = document.getElementById("troco").value;

    if (!nome || !endereco || !pagamento) {
      alert("Por favor, preencha todos os campos obrigatórios.");
      return;
    }

    let itens = [];
    produtos.forEach(p => {
      const qtd = parseInt(document.getElementById(p.id) ? document.getElementById(p.id).value : 0) || 0;
      if (qtd > 0) itens.push(qtd + "x " + p.nome + " (R$ " + (qtd * p.preco).toFixed(2).replace(".", ",") + ")");
    });

    if (itens.length === 0) {
      alert("Adicione pelo menos um produto ao pedido.");
      return;
    }

    let subtotal = 0;
    produtos.forEach(p => { subtotal += (parseInt(document.getElementById(p.id) ? document.getElementById(p.id).value : 0) || 0) * p.preco; });
    const total = subtotal + taxaEntrega;

    let msg = "🍮 *Novo Pedido - Divino Pudim*

";
    msg += "👤 *Cliente:* " + nome + "
";
    msg += "📍 *Endereço:* " + endereco + "

";
    msg += "🛒 *Itens:*
" + itens.join("
") + "

";
    msg += "💰 *Subtotal:* R$ " + subtotal.toFixed(2).replace(".", ",") + "
";
    msg += "🚚 *Taxa de entrega:* R$ " + taxaEntrega.toFixed(2).replace(".", ",") + "
";
    msg += "✅ *Total a pagar:* R$ " + total.toFixed(2).replace(".", ",") + "

";
    msg += "💳 *Pagamento:* " + pagamento;
    if (pagamento === "Em espécie (no ato da entrega)" && troco) msg += "
💵 *Troco para:* R$ " + troco;

    const url = "https://wa.me/" + WHATSAPP_NUMERO + "?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
  }

  carregarPlanilha();
</script>
</body>
</html>
